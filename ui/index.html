<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SparkDB — Upload Files</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand: #7c3aed;
      --brand-light: #ede9fe;
      --brand-mid: #a78bfa;
      --bg: #f4f3f8;
      --surface: #ffffff;
      --surface2: #f9f8fc;
      --border: rgba(120, 100, 200, 0.13);
      --border2: rgba(120, 100, 200, 0.22);
      --text: #1a1625;
      --muted: #6b6580;
      --hint: #b0aac2;
      --success: #16a34a;
      --success-bg: #f0fdf4;
      --danger: #dc2626;
      --danger-bg: #fef2f2;
      --radius: 14px;
      --radius-sm: 8px;
      --radius-xs: 6px;
      --font: 'DM Sans', sans-serif;
      --mono: 'DM Mono', monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0d17;
        --surface: #1a1625;
        --surface2: #211d30;
        --border: rgba(167, 139, 250, 0.12);
        --border2: rgba(167, 139, 250, 0.22);
        --text: #f0ecff;
        --muted: #9d94b8;
        --hint: #5a5270;
        --brand-light: #2d2060;
        --success-bg: #0a1f0e;
        --danger-bg: #1f0a0a;
      }
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.25rem 2.5rem;
      width: 100%;
      max-width: 960px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-bottom: 2rem;
    }
    .logo img {
      width: 28px;
      height: 28px;
      border-radius: 7px;
      object-fit: contain;
    }
    .logo-name {
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .layout {
      display: flex;
      gap: 2.5rem;
      align-items: flex-start;
    }

    .col-left { flex: 1; min-width: 0; }
    .col-right { width: 340px; flex-shrink: 0; }

    h1 {
      font-size: 26px;
      font-weight: 500;
      letter-spacing: -0.02em;
      color: var(--text);
      margin-bottom: 4px;
    }
    .subhead {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }

    .dropzone {
      border: 1.5px dashed var(--brand-mid);
      border-radius: var(--radius);
      background: var(--surface2);
      padding: 3rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      cursor: pointer;
      text-align: center;
      transition: border-color .18s, background .18s;
      user-select: none;
    }
    .dropzone:hover,
    .dropzone.over {
      border-color: var(--brand);
      background: var(--brand-light);
    }
    .dropzone.over { border-style: solid; }

    .dz-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--brand-light);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform .2s;
    }
    .dropzone:hover .dz-icon,
    .dropzone.over .dz-icon { transform: translateY(-3px); }

    .dz-title { font-size: 14px; font-weight: 500; color: var(--text); }
    .dz-sub { font-size: 13px; color: var(--muted); margin-top: 2px; }

    .browse-btn {
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font);
      font-size: 13px;
      font-weight: 500;
      padding: 9px 24px;
      cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .browse-btn:hover { opacity: .88; }
    .browse-btn:active { transform: scale(.97); }

    .col-right-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .section-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }
    .remove-all {
      display: none;
      align-items: center;
      gap: 4px;
      font-family: var(--font);
      font-size: 12px;
      color: var(--muted);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: color .15s;
    }
    .remove-all:hover { color: var(--brand); }

    .file-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 440px;
      overflow-y: auto;
      padding-right: 2px;
    }
    .file-list::-webkit-scrollbar { width: 3px; }
    .file-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

    .empty {
      text-align: center;
      font-size: 13px;
      color: var(--hint);
      padding: 4rem 0;
    }

    .frow {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      animation: rowIn .22s ease both;
    }
    @keyframes rowIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .ficon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-xs);
      overflow: hidden;
      flex-shrink: 0;
      background: var(--brand-light);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ficon img { width: 36px; height: 36px; object-fit: contain; }

    .fmeta { flex: 1; min-width: 0; }

    .fname {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .fstat {
      font-size: 11.5px;
      margin-top: 2px;
      color: var(--muted);
    }
    .fstat.up  { color: var(--brand); }
    .fstat.ok  { color: var(--success); }
    .fstat.err { color: var(--danger); }

    .pbar-bg {
      height: 2px;
      border-radius: 2px;
      background: var(--border2);
      margin-top: 6px;
      overflow: hidden;
    }
    .pbar-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--brand);
      transition: width .28s ease;
    }
    .pbar-fill.ok  { background: var(--success); }
    .pbar-fill.err { background: var(--danger); }

    .url-box {
      margin-top: 8px;
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--radius-xs);
      padding: 7px 10px;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .url-lbl {
      font-size: 10.5px;
      font-family: var(--mono);
      color: var(--hint);
      flex-shrink: 0;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .url-val {
      font-size: 11.5px;
      font-family: var(--mono);
      color: var(--brand);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .copy-btn {
      flex-shrink: 0;
      background: var(--brand-light);
      border: none;
      border-radius: var(--radius-xs);
      font-family: var(--font);
      font-size: 11px;
      font-weight: 500;
      color: var(--brand);
      padding: 3px 9px;
      cursor: pointer;
      transition: opacity .15s;
      white-space: nowrap;
    }
    .copy-btn:hover { opacity: .8; }
    .copy-btn.done { background: var(--success-bg); color: var(--success); }

    .del-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--hint);
      flex-shrink: 0;
      padding: 3px;
      border-radius: var(--radius-xs);
      display: flex;
      align-items: center;
      transition: color .15s, background .15s;
    }
    .del-btn:hover { color: var(--brand); background: var(--brand-light); }

    @media (max-width: 680px) {
      body { padding: 1rem; align-items: flex-start; }
      .card { padding: 1.5rem 1.25rem; }
      .layout { flex-direction: column; gap: 2rem; }
      .col-right { width: 100%; }
    }
  </style>
</head>
<body>

<div class="card">

  <div class="logo">
    <img src="https://cdn.sparkdb.pro/files/8b8686431bf3.png" alt="SparkDB"/>
    <span class="logo-name">SparkDB</span>
  </div>

  <div class="layout">

    <!-- Left: drop zone -->
    <div class="col-left">
      <h1>Upload files</h1>
      <p class="subhead">Upload and manage your files seamlessly.</p>

      <div class="dropzone" id="dz" onclick="document.getElementById('fi').click()">
        <div class="dz-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M12 3v13M7 8l5-5 5 5" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M4 17v1a3 3 0 003 3h10a3 3 0 003-3v-1" stroke="#a78bfa" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <div class="dz-title">Drag and drop files here</div>
          <div class="dz-sub">Supports any file type &mdash; any size</div>
        </div>
        <button class="browse-btn" onclick="event.stopPropagation(); document.getElementById('fi').click()">
          Browse files
        </button>
      </div>

      <input type="file" id="fi" multiple style="display:none"/>
    </div>

    <!-- Right: file list -->
    <div class="col-right">
      <div class="col-right-head">
        <span class="section-title">Uploaded files</span>
        <button class="remove-all" id="rabtn" onclick="removeAll()">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none">
            <path d="M3 4h10M6 4V3h4v1M5 4l.5 9h5L11 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Remove all
        </button>
      </div>

      <div class="file-list" id="fl">
        <div class="empty">No files yet</div>
      </div>
    </div>

  </div>
</div>

<script>
  const UPLOAD_URL = 'https://cdn.sparkdb.pro/upload';
  const dz    = document.getElementById('dz');
  const fi    = document.getElementById('fi');
  const fl    = document.getElementById('fl');
  const rabtn = document.getElementById('rabtn');
  let files = [];

  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('over'); });
  dz.addEventListener('dragleave', e => { if (!dz.contains(e.relatedTarget)) dz.classList.remove('over'); });
  dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('over'); handle([...e.dataTransfer.files]); });
  fi.addEventListener('change', () => { handle([...fi.files]); fi.value = ''; });

  function fmtSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1048576).toFixed(1) + ' MB';
  }

  function esc(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function handle(raw) {
    raw.forEach(f => {
      const id = Math.random().toString(36).slice(2, 10);
      const entry = { id, name: f.name, size: f.size, status: 'uploading', progress: 0, url: null };
      files.push(entry);
      render();
      upload(entry, f);
    });
  }

  function upload(entry, file) {
    const xhr = new XMLHttpRequest();
    const fd  = new FormData();
    fd.append('file', file);

    xhr.upload.addEventListener('progress', e => {
      if (e.lengthComputable) {
        entry.progress = Math.round((e.loaded / e.total) * 100);
        patchRow(entry);
      }
    });

    xhr.addEventListener('load', () => {
      if (xhr.status >= 200 && xhr.status < 300) {
        try {
          const r = JSON.parse(xhr.responseText);
          entry.url = r.url || null;
        } catch(_) {}
        entry.status = 'complete';
        entry.progress = 100;
      } else {
        entry.status = 'error';
      }
      patchRow(entry);
    });

    xhr.addEventListener('error', () => { entry.status = 'error'; patchRow(entry); });
    xhr.open('POST', UPLOAD_URL);
    xhr.send(fd);
  }

  function rowHTML(f) {
    const sCls = f.status === 'uploading' ? 'up' : f.status === 'complete' ? 'ok' : 'err';
    const sTxt = f.status === 'uploading'
      ? fmtSize(f.size) + ' &nbsp;&middot;&nbsp; ' + f.progress + '%'
      : f.status === 'complete' ? 'Upload complete' : 'Upload failed';
    const pCls = f.status === 'complete' ? 'ok' : f.status === 'error' ? 'err' : '';
    const pct  = f.status === 'error' ? 100 : f.progress;

    const urlBlock = (f.status === 'complete' && f.url)
      ? `<div class="url-box">
           <span class="url-lbl">url</span>
           <span class="url-val" title="${esc(f.url)}">${esc(f.url)}</span>
           <button class="copy-btn" id="cp-${f.id}" onclick="copyUrl('${f.id}', this)">Copy</button>
         </div>`
      : '';

    return `<div class="frow" id="fr-${f.id}">
      <div class="ficon">
        <img src="https://cdn.sparkdb.pro/files/8b8686431bf3.png" alt=""/>
      </div>
      <div class="fmeta">
        <div class="fname" title="${esc(f.name)}">${esc(f.name)}</div>
        <div class="fstat ${sCls}">${sTxt}</div>
        <div class="pbar-bg">
          <div class="pbar-fill ${pCls}" style="width:${pct}%"></div>
        </div>
        ${urlBlock}
      </div>
      <button class="del-btn" onclick="removeFile('${f.id}')" title="Remove">
        <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
          <path d="M3 4h10M6 4V3h4v1M5 4l.5 9h5L11 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>`;
  }

  function render() {
    if (files.length === 0) {
      fl.innerHTML = '<div class="empty">No files yet</div>';
      rabtn.style.display = 'none';
      return;
    }
    rabtn.style.display = 'flex';
    fl.innerHTML = files.map(rowHTML).join('');
  }

  function patchRow(entry) {
    const el = document.getElementById('fr-' + entry.id);
    if (!el) { render(); return; }
    const tmp = document.createElement('div');
    tmp.innerHTML = rowHTML(entry);
    el.replaceWith(tmp.firstElementChild);
  }

  function copyUrl(id, btn) {
    const row = document.getElementById('fr-' + id);
    if (!row) return;
    const urlEl = row.querySelector('.url-val');
    if (!urlEl) return;
    navigator.clipboard.writeText(urlEl.textContent.trim()).then(() => {
      btn.textContent = 'Copied!';
      btn.classList.add('done');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('done'); }, 2000);
    }).catch(() => {});
  }

  function removeFile(id) {
    files = files.filter(f => f.id !== id);
    render();
  }

  function removeAll() {
    files = [];
    render();
  }

  render();
</script>
</body>
</html>
