<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SparkDB — Upload Files</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #eef0f5; }

    .card {
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 4px 32px rgba(80,80,120,0.08);
    }

    .dropzone {
      border: 2px dashed #c4b5fd;
      border-radius: 14px;
      background: #f8f7ff;
      transition: background 0.2s, border-color 0.2s;
      cursor: pointer;
    }
    .dropzone.dragover {
      background: #ede9fe;
      border-color: #7c3aed;
    }

    .browse-btn {
      background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%);
      color: #fff;
      border-radius: 10px;
      font-weight: 600;
      font-size: 15px;
      padding: 14px 48px;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      letter-spacing: 0.01em;
    }
    .browse-btn:hover { opacity: 0.92; transform: translateY(-1px); }
    .browse-btn:active { transform: translateY(0); }

    /* Progress bar */
    .progress-bar-bg {
      height: 3px;
      border-radius: 999px;
      background: #ede9fe;
      margin-top: 6px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #7c3aed, #a78bfa);
      transition: width 0.3s ease;
    }

    /* File row */
    .file-row {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #f0eeff;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
      animation: fadeSlideIn 0.25s ease forwards;
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .file-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .status-badge {
      font-size: 12.5px;
      color: #9ca3af;
      white-space: nowrap;
    }
    .status-badge.uploading { color: #7c3aed; }

    .delete-btn {
      background: #f5f3ff;
      border: none;
      border-radius: 8px;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .delete-btn:hover { background: #ede9fe; }

    .cloud-icon {
      color: #a78bfa;
    }

    /* Remove all */
    .remove-all {
      font-size: 13px;
      color: #9ca3af;
      text-align: right;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      transition: color 0.15s;
    }
    .remove-all:hover { color: #7c3aed; }

    /* Scrollbar for file list */
    .file-list::-webkit-scrollbar { width: 4px; }
    .file-list::-webkit-scrollbar-track { background: transparent; }
    .file-list::-webkit-scrollbar-thumb { background: #e9d5ff; border-radius: 4px; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">

  <div class="card w-full max-w-4xl p-10">

    <!-- Logo -->
    <div class="flex items-center gap-2 mb-8">
      <svg width="26" height="26" viewBox="0 0 26 26" fill="none">
        <path d="M13 2L3 8.5V17.5L13 24L23 17.5V8.5L13 2Z" fill="#7c3aed" opacity="0.15"/>
        <path d="M16 7L10 13.5L13 16L20 8.5L16 7Z" fill="#7c3aed"/>
        <path d="M10 13.5L6 17.5L10 19.5L14 16L10 13.5Z" fill="#a78bfa"/>
      </svg>
      <span class="text-[17px] font-bold text-gray-800 tracking-tight">SparkDB</span>
    </div>

    <div class="flex flex-col lg:flex-row gap-10">

      <!-- Left: Drop Zone -->
      <div class="flex-1">
        <h1 class="text-3xl font-bold text-gray-900 mb-1">Upload Files</h1>
        <p class="text-gray-400 text-[15px] mb-6">Upload and manage your files seamlessly.</p>

        <div
          id="dropzone"
          class="dropzone flex flex-col items-center justify-center py-16 px-8 gap-4"
          onclick="document.getElementById('fileInput').click()"
        >
          <!-- Cloud icon -->
          <svg class="cloud-icon" width="72" height="56" viewBox="0 0 72 56" fill="none">
            <ellipse cx="36" cy="38" rx="28" ry="14" fill="#ede9fe"/>
            <path d="M22 38C22 30.268 28.268 24 36 24C42.192 24 47.43 27.896 49.32 33.4C53.578 33.886 57 37.566 57 42C57 46.694 53.14 50.5 48.4 50.5H23.6C18.328 50.5 14 46.238 14 41C14 38.09 15.27 35.476 17.31 33.65" stroke="#c4b5fd" stroke-width="0" fill="none"/>
            <ellipse cx="36" cy="34" rx="18" ry="14" fill="#ddd6fe"/>
            <circle cx="36" cy="28" r="14" fill="#c4b5fd" opacity="0.5"/>
            <ellipse cx="36" cy="30" rx="22" ry="16" fill="#ede9fe"/>
            <!-- arrow up -->
            <line x1="36" y1="18" x2="36" y2="40" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round"/>
            <polyline points="29,26 36,18 43,26" fill="none" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>

          <div class="text-center">
            <p class="text-gray-700 font-semibold text-[16px]">Drag and drop files here</p>
            <p class="text-gray-400 text-[14px] mt-1">or click to browse</p>
          </div>

          <button
            class="browse-btn mt-2"
            onclick="event.stopPropagation(); document.getElementById('fileInput').click()"
          >Browse Files</button>
        </div>

        <input type="file" id="fileInput" multiple class="hidden" />
      </div>

      <!-- Right: File list -->
      <div class="w-full lg:w-[360px] flex flex-col">
        <h2 class="text-[17px] font-bold text-gray-800 mb-4">Uploaded Files</h2>

        <div id="fileList" class="file-list flex flex-col gap-3 max-h-[420px] overflow-y-auto pr-1">
          <!-- injected by JS -->
          <div id="emptyState" class="text-center text-gray-300 text-sm py-12">No files yet</div>
        </div>

        <div id="removeAllWrapper" class="remove-all mt-4 hidden" onclick="removeAll()">
          Remove all
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <path d="M4 8h8M8 4l4 4-4 4" stroke="#9ca3af" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

    </div>
  </div>

  <script>
    const UPLOAD_URL = 'http://localhost:6003/upload';

    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const emptyState = document.getElementById('emptyState');
    const removeAllWrapper = document.getElementById('removeAllWrapper');

    let files = []; // { id, name, ext, size, status, progress, url, cancelFn }

    // ── Drag events ──────────────────────────────────────────────
    dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
    dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
    dropzone.addEventListener('drop', e => {
      e.preventDefault();
      dropzone.classList.remove('dragover');
      handleFiles([...e.dataTransfer.files]);
    });

    fileInput.addEventListener('change', () => {
      handleFiles([...fileInput.files]);
      fileInput.value = '';
    });

    // ── File type → icon ─────────────────────────────────────────
    function getIconHTML(ext) {
      const e = (ext || '').toLowerCase();

      const icons = {
        pdf: `<div class="file-icon" style="background:#fff0f0;">
                <svg width="28" height="32" viewBox="0 0 28 32" fill="none">
                  <rect x="1" y="1" width="26" height="30" rx="4" fill="#e53e3e"/>
                  <rect x="1" y="1" width="26" height="12" rx="4" fill="#c53030"/>
                  <text x="14" y="10" text-anchor="middle" fill="white" font-size="7" font-weight="800" font-family="Inter,sans-serif">PDF</text>
                  <rect x="5" y="16" width="18" height="1.5" rx="1" fill="white" opacity="0.7"/>
                  <rect x="5" y="20" width="14" height="1.5" rx="1" fill="white" opacity="0.7"/>
                  <rect x="5" y="24" width="16" height="1.5" rx="1" fill="white" opacity="0.7"/>
                </svg>
              </div>`,

        xlsx: `<div class="file-icon" style="background:#f0fff4;">
                <svg width="28" height="32" viewBox="0 0 28 32" fill="none">
                  <rect x="1" y="1" width="26" height="30" rx="4" fill="#38a169"/>
                  <rect x="1" y="1" width="26" height="12" rx="4" fill="#276749"/>
                  <text x="14" y="10" text-anchor="middle" fill="white" font-size="7" font-weight="800" font-family="Inter,sans-serif">XLS</text>
                  <path d="M6 17l5 7M11 17l-5 7" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
                  <rect x="15" y="17" width="7" height="7" rx="1" stroke="white" stroke-width="1.4" opacity="0.7"/>
                </svg>
              </div>`,

        xls: `<div class="file-icon" style="background:#f0fff4;">
                <svg width="28" height="32" viewBox="0 0 28 32" fill="none">
                  <rect x="1" y="1" width="26" height="30" rx="4" fill="#38a169"/>
                  <rect x="1" y="1" width="26" height="12" rx="4" fill="#276749"/>
                  <text x="14" y="10" text-anchor="middle" fill="white" font-size="7" font-weight="800" font-family="Inter,sans-serif">XLS</text>
                  <path d="M6 17l5 7M11 17l-5 7" stroke="white" stroke-width="1.8" stroke-linecap="round" opacity="0.9"/>
                </svg>
              </div>`,

        pptx: `<div class="file-icon" style="background:#fff8f0;">
                <svg width="28" height="32" viewBox="0 0 28 32" fill="none">
                  <rect x="1" y="1" width="26" height="30" rx="4" fill="#e53e3e"/>
                  <rect x="1" y="1" width="26" height="12" rx="4" fill="#c53030"/>
                  <text x="14" y="10" text-anchor="middle" fill="white" font-size="6" font-weight="800" font-family="Inter,sans-serif">PPTX</text>
                  <rect x="5" y="15" width="18" height="11" rx="2" fill="white" opacity="0.15"/>
                  <rect x="7" y="17" width="10" height="7" rx="1" fill="white" opacity="0.3"/>
                </svg>
              </div>`,

        ppt: `<div class="file-icon" style="background:#fff8f0;">
                <svg width="28" height="32" viewBox="0 0 28 32" fill="none">
                  <rect x="1" y="1" width="26" height="30" rx="4" fill="#e53e3e"/>
                  <rect x="1" y="1" width="26" height="12" rx="4" fill="#c53030"/>
                  <text x="14" y="10" text-anchor="middle" fill="white" font-size="7" font-weight="800" font-family="Inter,sans-serif">PPT</text>
                </svg>
              </div>`,

        docx: `<div class="file-icon" style="background:#ebf8ff;">
                <svg width="28" height="32" viewBox="0 0 28 32" fill="none">
                  <rect x="1" y="1" width="26" height="30" rx="4" fill="#3182ce"/>
                  <rect x="1" y="1" width="26" height="12" rx="4" fill="#2c5282"/>
                  <text x="14" y="10" text-anchor="middle" fill="white" font-size="5.5" font-weight="800" font-family="Inter,sans-serif">DOCX</text>
                  <rect x="5" y="16" width="18" height="1.5" rx="1" fill="white" opacity="0.7"/>
                  <rect x="5" y="20" width="14" height="1.5" rx="1" fill="white" opacity="0.7"/>
                  <rect x="5" y="24" width="16" height="1.5" rx="1" fill="white" opacity="0.7"/>
                </svg>
              </div>`,

        doc: `<div class="file-icon" style="background:#ebf8ff;">
                <svg width="28" height="32" viewBox="0 0 28 32" fill="none">
                  <rect x="1" y="1" width="26" height="30" rx="4" fill="#3182ce"/>
                  <rect x="1" y="1" width="26" height="12" rx="4" fill="#2c5282"/>
                  <text x="14" y="10" text-anchor="middle" fill="white" font-size="7" font-weight="800" font-family="Inter,sans-serif">DOC</text>
                </svg>
              </div>`,

        mp3: `<div class="file-icon" style="background:#f0f4ff;">
                <svg width="28" height="32" viewBox="0 0 28 32" fill="none">
                  <rect x="1" y="1" width="26" height="30" rx="4" fill="#667eea"/>
                  <rect x="1" y="1" width="26" height="12" rx="4" fill="#4c51bf"/>
                  <text x="14" y="10" text-anchor="middle" fill="white" font-size="6.5" font-weight="800" font-family="Inter,sans-serif">MP3</text>
                  <circle cx="11" cy="22" r="3.5" stroke="white" stroke-width="1.5" opacity="0.8"/>
                  <circle cx="11" cy="22" r="1" fill="white" opacity="0.8"/>
                  <path d="M14.5 18v8" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
                  <path d="M17 19.5v5" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
                </svg>
              </div>`,

        mp4: `<div class="file-icon" style="background:#fff0f0;">
                <svg width="28" height="32" viewBox="0 0 28 32" fill="none">
                  <rect x="1" y="1" width="26" height="30" rx="4" fill="#e53e3e"/>
                  <rect x="1" y="1" width="26" height="12" rx="4" fill="#c53030"/>
                  <text x="14" y="10" text-anchor="middle" fill="white" font-size="6.5" font-weight="800" font-family="Inter,sans-serif">MP4</text>
                  <path d="M9 18l10 5-10 5V18Z" fill="white" opacity="0.8"/>
                </svg>
              </div>`,

        png: `<div class="file-icon" style="background:#f0fff4;">
                <svg width="28" height="32" viewBox="0 0 28 32" fill="none">
                  <rect x="1" y="1" width="26" height="30" rx="4" fill="#48bb78"/>
                  <rect x="1" y="1" width="26" height="12" rx="4" fill="#276749"/>
                  <text x="14" y="10" text-anchor="middle" fill="white" font-size="6.5" font-weight="800" font-family="Inter,sans-serif">PNG</text>
                  <circle cx="10" cy="21" r="3" fill="white" opacity="0.3"/>
                  <path d="M5 28l6-7 4 4 3-3 5 6H5Z" fill="white" opacity="0.5"/>
                </svg>
              </div>`,

        jpg: `<div class="file-icon" style="background:#f0fff4;">
                <svg width="28" height="32" viewBox="0 0 28 32" fill="none">
                  <rect x="1" y="1" width="26" height="30" rx="4" fill="#48bb78"/>
                  <rect x="1" y="1" width="26" height="12" rx="4" fill="#276749"/>
                  <text x="14" y="10" text-anchor="middle" fill="white" font-size="6.5" font-weight="800" font-family="Inter,sans-serif">JPG</text>
                  <circle cx="10" cy="21" r="3" fill="white" opacity="0.3"/>
                  <path d="M5 28l6-7 4 4 3-3 5 6H5Z" fill="white" opacity="0.5"/>
                </svg>
              </div>`,

        zip: `<div class="file-icon" style="background:#fffbeb;">
                <svg width="28" height="32" viewBox="0 0 28 32" fill="none">
                  <rect x="1" y="1" width="26" height="30" rx="4" fill="#d97706"/>
                  <rect x="1" y="1" width="26" height="12" rx="4" fill="#92400e"/>
                  <text x="14" y="10" text-anchor="middle" fill="white" font-size="7" font-weight="800" font-family="Inter,sans-serif">ZIP</text>
                  <rect x="11" y="15" width="6" height="3" rx="1" fill="white" opacity="0.5"/>
                  <rect x="11" y="20" width="6" height="3" rx="1" fill="white" opacity="0.5"/>
                  <rect x="11" y="25" width="6" height="2" rx="1" fill="white" opacity="0.5"/>
                </svg>
              </div>`,
      };

      return icons[e] || `<div class="file-icon" style="background:#f3f4f6;">
        <svg width="28" height="32" viewBox="0 0 28 32" fill="none">
          <rect x="1" y="1" width="26" height="30" rx="4" fill="#9ca3af"/>
          <rect x="5" y="14" width="18" height="1.5" rx="1" fill="white" opacity="0.7"/>
          <rect x="5" y="18" width="14" height="1.5" rx="1" fill="white" opacity="0.7"/>
          <rect x="5" y="22" width="16" height="1.5" rx="1" fill="white" opacity="0.7"/>
        </svg>
      </div>`;
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    // ── Render ────────────────────────────────────────────────────
    function render() {
      if (files.length === 0) {
        fileList.innerHTML = '<div id="emptyState" class="text-center text-gray-300 text-sm py-12">No files yet</div>';
        removeAllWrapper.classList.add('hidden');
        return;
      }
      removeAllWrapper.classList.remove('hidden');

      fileList.innerHTML = files.map(f => {
        const isUploading = f.status === 'uploading';
        const isComplete  = f.status === 'complete';
        const isError     = f.status === 'error';

        const statusHTML = isUploading
          ? `<span class="status-badge uploading">${formatSize(f.size)} &nbsp;${f.progress}%</span>`
          : isComplete
          ? `<span class="status-badge">Complete</span>`
          : `<span class="status-badge" style="color:#ef4444">Error</span>`;

        const progressHTML = isUploading
          ? `<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${f.progress}%"></div></div>`
          : isComplete
          ? `<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:100%;background:linear-gradient(90deg,#7c3aed,#a78bfa)"></div></div>`
          : `<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:100%;background:#ef4444"></div></div>`;

        return `
          <div class="file-row" id="file-${f.id}">
            ${getIconHTML(f.ext)}
            <div class="flex-1 min-w-0">
              <div class="flex items-center justify-between gap-2">
                <span class="text-[14px] font-medium text-gray-800 truncate">${escHtml(f.name)}</span>
                ${statusHTML}
              </div>
              ${progressHTML}
            </div>
            <button class="delete-btn" onclick="removeFile('${f.id}')" title="Remove">
              <svg width="15" height="15" viewBox="0 0 16 16" fill="none">
                <path d="M3 4h10M6 4V3h4v1M5 4l.5 9h5L11 4" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>`;
      }).join('');
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Upload ────────────────────────────────────────────────────
    function handleFiles(rawFiles) {
      rawFiles.forEach(file => {
        const id  = Math.random().toString(36).slice(2);
        const ext = file.name.split('.').pop() || '';
        const entry = { id, name: file.name, ext, size: file.size, status: 'uploading', progress: 0, url: null };
        files.push(entry);
        render();
        uploadFile(entry, file);
      });
    }

    function uploadFile(entry, file) {
      const xhr = new XMLHttpRequest();
      const fd  = new FormData();
      fd.append('file', file);

      xhr.upload.addEventListener('progress', e => {
        if (e.lengthComputable) {
          entry.progress = Math.round((e.loaded / e.total) * 100);
          render();
        }
      });

      xhr.addEventListener('load', () => {
        if (xhr.status === 200) {
          try {
            const res = JSON.parse(xhr.responseText);
            entry.url = res.url;
          } catch (_) {}
          entry.status = 'complete';
          entry.progress = 100;
        } else {
          entry.status = 'error';
        }
        render();
      });

      xhr.addEventListener('error', () => {
        entry.status = 'error';
        render();
      });

      xhr.open('POST', UPLOAD_URL);
      xhr.send(fd);
    }

    function removeFile(id) {
      files = files.filter(f => f.id !== id);
      render();
    }

    function removeAll() {
      files = [];
      render();
    }

    render();
  </script>
</body>
</html>
